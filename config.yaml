ado:
  org_url: "https://dev.azure.com/YOUR_ORG"
  project: "YOUR_PROJECT"
  work_item_type: "DQCP Checkpoint"
  assigned_to: "your.email@company.com"

excel:
  # Sheet to parse (all other sheets are treated as lookups)
  master_sheet: "DQCP_Master"

  # ── Identity columns ──────────────────────────────────────────────────────
  id_column: "DQCP_Id"               # e.g. 01.03.0001  → used as checkpoint_key
  data_level_column: "Data_Level"
  data_sub_level_column: "Data_Sub_Level"
  sequence_column: "Sequence_Number"
  data_element_column: "Data_Element" # field being validated (SSN, Birth Date…)

  # ── Content columns ───────────────────────────────────────────────────────
  title_column: "DQCP_Title"          # → ADO System.Title
  description_column: "DQCP_Description"
  pseudo_code_column: "DQCP_Pseudo_Code"

  # ── Source mapping columns ────────────────────────────────────────────────
  table_name_column: "Table_Name"
  column_name_column: "Column_Name"
  sys_table_column: "Sys_Table_Name"
  sys_column_column: "Sys_Column_Name"

  # ── Status / approval flags ───────────────────────────────────────────────
  status_column: "DQCP_Status"        # Active | WIP | Info | Removed
  is_approved_column: "Is_Approved"   # Y | N
  rollout_column: "RollOut"           # Y | N

  # ── Dates ─────────────────────────────────────────────────────────────────
  start_date_column: "Start_Date"
  end_date_column: "End_Date"
  last_modified_column: "Last_Modified_Date"
  resolved_date_column: "DQCP_Resolved_Date"

  # ── Open items / audit ────────────────────────────────────────────────────
  comments_column: "DQCP_Comments"
  questions_column: "DQCP_Questions"
  question_status_column: "DQCP_Question_Status"
  change_history_column: "DQCP_Change_History"
  resolution_column: "DQCP_Resolution"

  # ── ADO sync filters (rows outside these are skipped) ────────────────────
  sync_statuses:                      # only rows with these DQCP_Status values are pushed
    - "Active"
    - "WIP"

knowledge:
  chroma_path: ".chroma"
  collection_name: "dqcp_knowledge"
  embedding_model: "all-MiniLM-L6-v2"
  chunk_size: 800
  chunk_overlap: 100
  top_k_results: 5

ollama:
  base_url: "http://localhost:11434"
  model: "llama3.1"
  # Recommended alternatives:
  #   mistral          — fast, good for structured Q&A
  #   qwen2.5          — strong on technical/SQL content
  #   deepseek-r1:8b   — reasoning-focused, good for rule analysis
  #   phi3             — lightweight, good for constrained hardware
  num_ctx: 4096          # context window passed to Ollama
  temperature: 0.1       # low temperature for precise, factual answers
  stream: false

app:
  default_role: "analyst"
  state_store_path: "state_store.json"
